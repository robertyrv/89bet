<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>86BET - Cassino Online</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f1720;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
background:#00c853;
padding:15px 30px;
}

.logo{
font-size:28px;
font-weight:bold;
}

nav button{
margin-left:10px;
padding:10px 18px;
border:none;
border-radius:6px;
background:#004d1a;
color:white;
cursor:pointer;
}

.banner{
text-align:center;
padding:80px 20px;
background:linear-gradient(#00c853,#003d14);
}

.banner h1{
font-size:48px;
margin-bottom:10px;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.game{
background:#1c2630;
padding:20px;
border-radius:10px;
text-align:center;
}

.game button{
margin-top:10px;
padding:10px 15px;
background:#00c853;
border:none;
border-radius:5px;
cursor:pointer;
}

.wallet{
position:fixed;
bottom:20px;
right:20px;
background:#00c853;
padding:15px;
border-radius:10px;
}

footer{
text-align:center;
padding:20px;
background:#0b1118;
margin-top:40px;
}

</style>
</head>

<body>

<header>

<div class="logo">86BET</div>

<nav>
<button onclick="login()">Login</button>
<button onclick="register()">Registrar</button>
</nav>

</header>

<div class="banner">

<h1>Bem-vindo ao 86BET</h1>
<p>O melhor cassino online</p>

</div>

<section class="games">

<div class="game">
<h3>🎰 Slots</h3>
<p>Tente a sorte</p>
<button onclick="play()">Jogar</button>
</div>

<div class="game">
<h3>🎲 Dice</h3>
<p>Aposte e ganhe</p>
<button onclick="play()">Jogar</button>
</div>

<div class="game">
<h3>🃏 Blackjack</h3>
<p>Chegue a 21</p>
<button onclick="play()">Jogar</button>
</div>

<div class="game">
<h3>⚽ Apostas Esportivas</h3>
<p>Ganhe com seu time</p>
<button onclick="play()">Jogar</button>
</div>

</section>

<div class="wallet">
Saldo: R$ <span id="saldo">100</span>
</div>

<footer>
© 2026 86BET - Todos os direitos reservados
</footer>

<script>

let saldo = 100;

function login(){
alert("Sistema de login em desenvolvimento");
}

function register(){
alert("Cadastro em desenvolvimento");
}

function play(){

let aposta = 10;

if(saldo < aposta){
alert("Saldo insuficiente");
return;
}

saldo -= aposta;

if(Math.random() > 0.5){
saldo += 20;
alert("Você ganhou!");
}else{
alert("Você perdeu!");
}

document.getElementById("saldo").innerText = saldo;

}

</script>

</body>
</html>
